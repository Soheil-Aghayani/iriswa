<article class="news-card">
    <a href="{{ url }}" class="news-card-link" style="text-decoration: none; color: inherit;">
        <img src="{{ image }}" alt="{{ title }}" class="news-card-image">
        
        <div class="news-card-content">
            <h3 class="news-card-title" style="margin: 0 0 10px 0; font-size: 1.25rem; color: var(--color-dark); font-weight: 900;">
                {{ title }}
            </h3>
            
            <p class="news-card-excerpt" style="font-size: 0.95rem; color: #64748b; line-height: 1.6; margin-bottom: 15px;">
                {{ excerpt }}
            </p>
            
            <div class="news-card-footer" style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; padding-top: 15px;">
                <span class="news-card-date" style="font-size: 0.85rem; color: #94a3b8;">
                    {{ date }}
                </span>
                <span class="news-card-more" style="color: var(--color-secondary); font-weight: bold; font-size: 0.9rem;">
                    مشاهده کامل &larr;
                </span>
            </div>
        </div>
    </a>
</article>
